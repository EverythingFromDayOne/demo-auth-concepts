<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CloudPortal — WebAuthn</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="demo-banner"></div>
  <div class="top">
    <div><strong>CloudPortal</strong> — Manage your cloud resources</div>
    <button id="btn-logout" class="btn out" style="display:none">Logout</button>
  </div>
  <div class="wrap">
    <div id="login" class="card">
      <div id="login-notice" class="mode-notice"></div>
      <h3 style="margin:.8rem 0">Sign in with Passkey</h3>
      <button id="btn-passkey-login" class="passkey-btn">🔑 Sign in with Passkey</button>
      <div id="auth-result" class="result"></div>
      <hr style="margin:1rem 0;border:0;border-top:1px solid #e2e8f0">
      <h3 style="margin:.3rem 0 .7rem">Sign in with password</h3>
      <input id="username" class="login-input" value="alice">
      <div style="height:.6rem"></div>
      <input id="password" class="login-input" type="password" value="pass1234">
      <div style="height:.8rem"></div>
      <button id="btn-login" class="btn">Continue</button>
      <div id="login-result" class="result"></div>
    </div>
    <div id="dashboard" class="card" style="display:none">
      <h3>Cloud Resources</h3>
      <div id="passkey-panel"></div>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Region</th><th>Status</th></tr></thead>
        <tbody id="resources"></tbody>
      </table>
    </div>
  </div>
  <script>
    let appMode = 'vulnerable';
    let token = localStorage.getItem('cpToken') || null;

    fetch('/api/config').then(function (r) { return r.json(); }).then(function (cfg) {
      appMode = cfg.mode;
      var banner = document.getElementById('demo-banner');
      var notice = document.getElementById('login-notice');
      if (cfg.mode === 'vulnerable') {
        banner.style.cssText = 'background:#fffbeb;border-bottom:2px solid #f59e0b;color:#92400e;padding:0.65rem 1.5rem;font-size:0.85rem';
        banner.textContent = '⚠ VULNERABLE: User verification discouraged — no biometric prompt. Counter not updated. Challenge reused.';
        notice.className = 'mode-notice vulnerable';
        notice.textContent = '⚠️ WEAK WEBAUTHN: User verification is discouraged. No biometric will be prompted.';
      } else {
        banner.style.cssText = 'background:#f0fdf4;border-bottom:2px solid #22c55e;color:#166534;padding:0.65rem 1.5rem;font-size:0.85rem';
        banner.textContent = '✅ SECURE: User verification required. Biometric always prompted. Single-use expiring challenges. Counter tracked.';
        notice.className = 'mode-notice secure';
        notice.textContent = '✅ HARDENED WEBAUTHN: User verification required. Your biometric is always prompted. Challenge is single-use and expires in 5 minutes.';
      }
    });

    function showResult(id, type, msg) {
      var e = document.getElementById(id);
      e.className = 'result ' + type;
      e.textContent = msg;
      e.style.display = 'block';
    }

    function base64urlToBuffer(base64url) {
      var base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
      var padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
      var binary = atob(padded);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    function bufferToBase64url(buffer) {
      var bytes = new Uint8Array(buffer);
      var binary = '';
      for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function prepareRegistrationOptions(o) {
      return Object.assign({}, o, {
        challenge: base64urlToBuffer(o.challenge),
        user: Object.assign({}, o.user, { id: base64urlToBuffer(o.user.id) }),
        excludeCredentials: (o.excludeCredentials || []).map(function (c) {
          return Object.assign({}, c, { id: base64urlToBuffer(c.id) });
        })
      });
    }

    function prepareAuthOptions(o) {
      return Object.assign({}, o, {
        challenge: base64urlToBuffer(o.challenge),
        allowCredentials: (o.allowCredentials || []).map(function (c) {
          return Object.assign({}, c, { id: base64urlToBuffer(c.id) });
        })
      });
    }

    function serializeRegistrationCredential(c) {
      return {
        id: c.id,
        rawId: bufferToBase64url(c.rawId),
        type: c.type,
        response: {
          clientDataJSON: bufferToBase64url(c.response.clientDataJSON),
          attestationObject: bufferToBase64url(c.response.attestationObject)
        }
      };
    }

    function serializeAuthCredential(c) {
      return {
        id: c.id,
        rawId: bufferToBase64url(c.rawId),
        type: c.type,
        response: {
          clientDataJSON: bufferToBase64url(c.response.clientDataJSON),
          authenticatorData: bufferToBase64url(c.response.authenticatorData),
          signature: bufferToBase64url(c.response.signature),
          userHandle: c.response.userHandle ? bufferToBase64url(c.response.userHandle) : null
        }
      };
    }

    if (!window.PublicKeyCredential) {
      document.getElementById('btn-passkey-login').disabled = true;
      document.getElementById('btn-passkey-login').title = 'WebAuthn not supported';
      showResult('auth-result', 'info', 'ℹ️ WebAuthn not available — use password login below');
    }

    async function loadDashboard() {
      if (!token) {
        document.getElementById('login').style.display = 'block';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('btn-logout').style.display = 'none';
        return;
      }
      var meRes = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + token } });
      if (!meRes.ok) {
        token = null;
        localStorage.removeItem('cpToken');
        return loadDashboard();
      }
      var me = await meRes.json();
      var rs = await fetch('/api/resources', { headers: { Authorization: 'Bearer ' + token } });
      var data = await rs.json();
      document.getElementById('resources').innerHTML = data.map(function (r) {
        return '<tr><td>' + r.id + '</td><td>' + r.name + '</td><td>' + r.type + '</td><td>' + r.region + '</td><td>' + r.status + '</td></tr>';
      }).join('');
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('btn-logout').style.display = 'block';
      if (me.hasPasskey) {
        if (appMode === 'secure') {
          document.getElementById('passkey-panel').innerHTML =
            '<div style="background:#ecfdf5;border:1px solid #16a34a;color:#166534;padding:.6rem;border-radius:6px;font-size:.84rem;margin:.7rem 0">✅ Passkey active. Authenticator counter: <strong>' + me.authenticatorCounter + '</strong></div>';
        } else {
          document.getElementById('passkey-panel').innerHTML =
            '<div style="background:#ecfdf5;border:1px solid #16a34a;color:#166534;padding:.6rem;border-radius:6px;font-size:.84rem;margin:.7rem 0">✅ Passkey registered. You can sign in with your device next time.</div>';
        }
      } else {
        document.getElementById('passkey-panel').innerHTML =
          '<div style="background:#fef3c7;border:1px solid #d97706;color:#78350f;padding:.7rem;border-radius:6px;font-size:.84rem;margin:.7rem 0">' +
          '🔑 Secure your account with a Passkey<br>' +
          (appMode === 'vulnerable' ? "Register your device's biometric sensor as a sign-in method.<br>" : '') +
          '<button id="btn-register-passkey" class="btn" style="margin-top:.55rem">Register Passkey</button>' +
          '<div id="passkey-result" class="result"></div></div>';
        var regBtn = document.getElementById('btn-register-passkey');
        if (regBtn) regBtn.addEventListener('click', registerPasskey);
      }
    }

    async function registerPasskey() {
      try {
        var optRes = await fetch('/api/register/begin', { headers: { Authorization: 'Bearer ' + token } });
        var serverOptions = await optRes.json();
        if (!optRes.ok) return showResult('passkey-result', 'failure', '✗ ' + serverOptions.error);
        var credential;
        try {
          credential = await navigator.credentials.create({ publicKey: prepareRegistrationOptions(serverOptions) });
        } catch (e) {
          if (e.name === 'NotAllowedError') return showResult('passkey-result', 'failure', '✗ Registration cancelled or timed out');
          return showResult('passkey-result', 'failure', '✗ ' + e.message);
        }
        var verRes = await fetch('/api/register/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify(serializeRegistrationCredential(credential))
        });
        var verData = await verRes.json();
        if (!verRes.ok) return showResult('passkey-result', 'failure', '✗ ' + verData.error);
        showResult('passkey-result', 'success', '✅ Passkey registered!' + (appMode === 'vulnerable' ? ' Use it next time you log in.' : ''));
        setTimeout(loadDashboard, 1200);
      } catch (e) {
        showResult('passkey-result', 'failure', '✗ ' + e.message);
      }
    }

    document.getElementById('btn-passkey-login').addEventListener('click', async function () {
      try {
        var optRes = await fetch('/api/auth/begin', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        var serverOptions = await optRes.json();
        if (!optRes.ok) return showResult('auth-result', 'failure', '✗ ' + serverOptions.error);
        var challengeKey = serverOptions.challengeKey;
        var assertion;
        try {
          assertion = await navigator.credentials.get({ publicKey: prepareAuthOptions(serverOptions) });
        } catch (e) {
          if (e.name === 'NotAllowedError') return showResult('auth-result', 'failure', '✗ Authentication cancelled or timed out');
          return showResult('auth-result', 'failure', '✗ ' + e.message);
        }
        var body = challengeKey
          ? Object.assign({ challengeKey: challengeKey }, serializeAuthCredential(assertion))
          : serializeAuthCredential(assertion);
        var authRes = await fetch('/api/auth/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var authData = await authRes.json();
        if (!authRes.ok) return showResult('auth-result', 'failure', '✗ ' + authData.error);
        token = authData.token;
        localStorage.setItem('cpToken', token);
        loadDashboard();
      } catch (e) {
        showResult('auth-result', 'failure', '✗ ' + e.message);
      }
    });

    document.getElementById('btn-login').addEventListener('click', async function () {
      try {
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        });
        var d = await r.json();
        if (!r.ok) return showResult('login-result', 'failure', '✗ ' + d.error);
        token = d.token;
        localStorage.setItem('cpToken', token);
        loadDashboard();
      } catch (e) {
        showResult('login-result', 'failure', '✗ ' + e.message);
      }
    });

    document.getElementById('btn-logout').addEventListener('click', async function () {
      if (token) {
        await fetch('/api/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + token } }).catch(function () {});
      }
      token = null;
      localStorage.removeItem('cpToken');
      loadDashboard();
    });

    loadDashboard();
  </script>
</body>
</html>
